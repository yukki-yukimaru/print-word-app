<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プリント英単語 発音アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4ff;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4a90e2, #7b5ea7);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.03em; }
    header p  { font-size: 0.85rem; margin-top: 6px; opacity: 0.9; }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ===== APIキー設定エリア ===== */
    #api-key-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .api-key-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .api-key-header h2 { font-size: 0.95rem; color: #444; }
    .api-key-saved {
      font-size: 0.75rem;
      background: #e6f9ee;
      color: #2a9d4e;
      border-radius: 99px;
      padding: 3px 10px;
      font-weight: 600;
    }
    .api-key-input-row {
      display: flex;
      gap: 8px;
    }
    #api-key-input {
      flex: 1;
      border: 1.5px solid #dce8ff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: #4a90e2; }
    .api-key-note {
      font-size: 0.75rem;
      color: #999;
      margin-top: 8px;
    }

    /* ===== 画像取り込みエリア ===== */
    .upload-area {
      background: white;
      border: 2px dashed #b0c4f0;
      border-radius: 16px;
      padding: 32px 16px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .upload-area.dragover { border-color: #4a90e2; background: #eef4ff; }
    .upload-area .icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-area .desc { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary { background: #4a90e2; color: white; }
    .btn-primary:hover:not(:disabled) { background: #3a7fd2; }
    .btn-camera  { background: #7b5ea7; color: white; }
    .btn-camera:hover:not(:disabled) { background: #6a4d96; }
    .btn-save    { background: #4a90e2; color: white; padding: 10px 18px; font-size: 0.85rem; }
    .btn-save:hover { background: #3a7fd2; }

    .btn-retry {
      background: white;
      color: #4a90e2;
      border: 2px solid #4a90e2;
      margin-top: 20px;
      width: 100%;
      justify-content: center;
    }
    .btn-retry:hover { background: #eef4ff; }

    #file-input   { display: none; }
    #camera-input { display: none; }

    /* ===== プレビュー ===== */
    #preview-section { display: none; margin-top: 20px; text-align: center; }
    #preview-img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 12px;
      border: 2px solid #dce8ff;
      object-fit: contain;
    }

    /* ===== 進捗 ===== */
    #progress-section { display: none; margin-top: 24px; }
    .progress-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      text-align: center;
    }
    .progress-bar-wrap {
      background: #dce8ff;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #4a90e2, #7b5ea7);
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.4s;
    }

    /* ===== 結果 ===== */
    #result-section { display: none; margin-top: 24px; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-header h2 { font-size: 1rem; color: #444; }
    .word-count {
      font-size: 0.8rem;
      background: #e8efff;
      color: #4a90e2;
      border-radius: 99px;
      padding: 3px 10px;
      font-weight: 600;
    }

    #word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .word-card {
      background: white;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .word-card:hover  { background: #f0f6ff; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,144,226,0.18); }
    .word-card:active { background: #dce8ff; transform: scale(0.98); }
    .word-card.speaking {
      background: linear-gradient(135deg, #eef4ff, #f0e8ff);
      border-left: 4px solid #4a90e2;
    }
    .word-text  { color: #222; }
    .speak-icon { font-size: 1.1rem; opacity: 0.5; transition: opacity 0.15s; }
    .word-card:hover .speak-icon { opacity: 1; }

    /* ===== エラー ===== */
    #error-msg {
      display: none;
      margin-top: 16px;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #c00;
      text-align: center;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #bbb;
      padding: 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>📖 プリント英単語 発音アプリ</h1>
  <p>プリントの画像から英単語を読み取って発音できます</p>
</header>

<main>

  <!-- APIキー設定 -->
  <div id="api-key-section">
    <div class="api-key-header">
      <h2>🔑 Gemini APIキー</h2>
      <span class="api-key-saved" id="key-status" style="display:none">✓ 保存済み</span>
    </div>
    <div class="api-key-input-row">
      <input type="password" id="api-key-input" placeholder="AIza で始まるキーを入力" autocomplete="off" />
      <button class="btn btn-save" onclick="saveApiKey()">保存</button>
    </div>
    <p class="api-key-note">※ キーはこのブラウザにのみ保存されます。外部には送信されません。</p>
  </div>

  <!-- 画像取り込み -->
  <div class="upload-area" id="upload-area">
    <div class="icon">🖼️</div>
    <p class="desc">英単語プリントの画像を選んでください<br>（JPG / PNG / HEIC など対応）</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
        📁 画像を選ぶ
      </button>
      <button class="btn btn-camera" onclick="document.getElementById('camera-input').click()">
        📷 カメラで撮る
      </button>
    </div>
    <input type="file" id="file-input"   accept="image/*"        onchange="handleFile(this.files[0])" />
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(this.files[0])" />
  </div>

  <!-- プレビュー -->
  <div id="preview-section">
    <img id="preview-img" src="" alt="選択した画像" />
  </div>

  <!-- 進捗 -->
  <div id="progress-section">
    <p class="progress-label" id="progress-label">読み取り中...</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- エラー -->
  <div id="error-msg"></div>

  <!-- 結果 -->
  <div id="result-section">
    <div class="result-header">
      <h2>📝 読み取った英単語</h2>
      <span class="word-count" id="word-count">0 語</span>
    </div>
    <div id="word-list"></div>
    <button class="btn btn-retry" onclick="resetApp()">🔄 別の画像でやり直す</button>
  </div>

</main>

<footer>タップすると発音します ・ Gemini AI + ブラウザ音声読み上げ</footer>

<script>
  // ===== APIキー管理 =====
  const KEY_STORAGE = 'gemini_api_key';

  function loadApiKey() {
    const key = localStorage.getItem(KEY_STORAGE) || '';
    if (key) {
      document.getElementById('api-key-input').value = key;
      document.getElementById('key-status').style.display = 'inline';
    }
    return key;
  }

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) { alert('APIキーを入力してください'); return; }
    localStorage.setItem(KEY_STORAGE, key);
    document.getElementById('key-status').style.display = 'inline';
    alert('保存しました！');
  }

  loadApiKey();

  // ===== ドラッグ＆ドロップ =====
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  // ===== ファイル処理メイン =====
  async function handleFile(file) {
    if (!file) return;

    const apiKey = localStorage.getItem(KEY_STORAGE);
    if (!apiKey) {
      showError('先にAPIキーを入力・保存してください。');
      return;
    }

    // プレビュー
    document.getElementById('preview-img').src = URL.createObjectURL(file);
    document.getElementById('preview-section').style.display = 'block';

    setProgress(20, 'AIに送信中...');
    document.getElementById('progress-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    try {
      // 画像をBase64に変換
      const base64 = await fileToBase64(file);
      const mimeType = file.type || 'image/jpeg';

      setProgress(50, 'AIが読み取り中...');

      // Gemini API呼び出し
      const words = await callGeminiOCR(apiKey, base64, mimeType);

      setProgress(100, '完了！');
      showResults(words);

    } catch (err) {
      console.error(err);
      showError(`読み取りに失敗しました。\n${err.message}`);
    } finally {
      document.getElementById('progress-section').style.display = 'none';
    }
  }

  // ===== 画像→Base64 =====
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // "data:image/jpeg;base64,XXXX" の XXXX 部分だけ取り出す
        const base64 = reader.result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ===== Gemini API で英単語を抽出 =====
  async function callGeminiOCR(apiKey, base64, mimeType) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    const prompt = `この画像は学校の英単語プリントです。
画像に書かれている英単語を、プリントに載っている順番通りにすべて抽出してください。

以下のルールで答えてください：
- 英単語だけを1行に1語ずつ出力する
- 日本語・数字・記号・番号は含めない
- 重複する単語は1回だけ出力する
- 余計な説明・コメントは不要
- 小文字で統一する

出力例：
apple
study
beautiful`;

    const body = {
      contents: [{
        parts: [
          { text: prompt },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]
      }],
      generationConfig: { temperature: 0 }
    };

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message || `HTTPエラー ${res.status}`;
      throw new Error(msg);
    }

    const json = await res.json();
    const text = json?.candidates?.[0]?.content?.parts?.[0]?.text || '';

    // 1行1語に分割して英単語のみ取り出す
    const words = text
      .split('\n')
      .map(line => line.trim().toLowerCase())
      .filter(line => /^[a-z][a-z'-]*[a-z]$/.test(line) || /^[a-z]{2}$/.test(line));

    return words;
  }

  // ===== 結果表示 =====
  function showResults(words) {
    const list = document.getElementById('word-list');
    const count = document.getElementById('word-count');
    const section = document.getElementById('result-section');

    list.innerHTML = '';
    count.textContent = `${words.length} 語`;

    if (words.length === 0) {
      list.innerHTML = '<div class="empty-state">英単語が見つかりませんでした。<br>別の画像をお試しください。</div>';
    } else {
      for (const word of words) {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `<span class="word-text">${word}</span><span class="speak-icon">🔊</span>`;
        card.addEventListener('click', () => speak(word, card));
        list.appendChild(card);
      }
    }

    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ===== 発音 =====
  function speak(word, cardEl) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.word-card.speaking').forEach(el => el.classList.remove('speaking'));

    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    utter.onstart = () => cardEl.classList.add('speaking');
    utter.onend   = () => cardEl.classList.remove('speaking');
    utter.onerror = () => cardEl.classList.remove('speaking');
    window.speechSynthesis.speak(utter);
  }

  // ===== 進捗バー =====
  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = `${pct}%`;
    document.getElementById('progress-label').textContent = label;
  }

  // ===== エラー表示 =====
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ===== リセット =====
  function resetApp() {
    document.getElementById('file-input').value = '';
    document.getElementById('camera-input').value = '';
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('progress-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    window.speechSynthesis.cancel();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
