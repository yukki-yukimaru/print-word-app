<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プリント英単語 発音アプリ</title>
  <!-- Tesseract.js OCRライブラリ（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    /* ===== リセット・ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4ff;
      color: #333;
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(135deg, #4a90e2, #7b5ea7);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.03em; }
    header p  { font-size: 0.85rem; margin-top: 6px; opacity: 0.9; }

    /* ===== メインコンテンツ ===== */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ===== 画像取り込みエリア ===== */
    .upload-area {
      background: white;
      border: 2px dashed #b0c4f0;
      border-radius: 16px;
      padding: 32px 16px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .upload-area.dragover { border-color: #4a90e2; background: #eef4ff; }

    .upload-area .icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-area .desc { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ===== ボタン共通 ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary { background: #4a90e2; color: white; }
    .btn-primary:hover:not(:disabled) { background: #3a7fd2; }

    .btn-camera  { background: #7b5ea7; color: white; }
    .btn-camera:hover:not(:disabled) { background: #6a4d96; }

    .btn-retry {
      background: white;
      color: #4a90e2;
      border: 2px solid #4a90e2;
      margin-top: 20px;
      width: 100%;
      justify-content: center;
    }
    .btn-retry:hover { background: #eef4ff; }

    /* 非表示のファイル入力 */
    #file-input        { display: none; }
    #camera-input      { display: none; }

    /* ===== プレビュー画像 ===== */
    #preview-section { display: none; margin-top: 20px; text-align: center; }
    #preview-img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 12px;
      border: 2px solid #dce8ff;
      object-fit: contain;
    }

    /* ===== OCR進捗 ===== */
    #progress-section { display: none; margin-top: 24px; }
    .progress-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      text-align: center;
    }
    .progress-bar-wrap {
      background: #dce8ff;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #4a90e2, #7b5ea7);
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.3s;
    }

    /* ===== 結果エリア ===== */
    #result-section { display: none; margin-top: 24px; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-header h2 { font-size: 1rem; color: #444; }
    .word-count {
      font-size: 0.8rem;
      background: #e8efff;
      color: #4a90e2;
      border-radius: 99px;
      padding: 3px 10px;
      font-weight: 600;
    }

    /* ===== 単語リスト ===== */
    #word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .word-card {
      background: white;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .word-card:hover  { background: #f0f6ff; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,144,226,0.18); }
    .word-card:active { background: #dce8ff; transform: scale(0.98); }

    .word-card.speaking {
      background: linear-gradient(135deg, #eef4ff, #f0e8ff);
      border-left: 4px solid #4a90e2;
    }

    .word-text  { color: #222; }
    .speak-icon { font-size: 1.1rem; opacity: 0.5; transition: opacity 0.15s; }
    .word-card:hover .speak-icon { opacity: 1; }

    /* ===== エラーメッセージ ===== */
    #error-msg {
      display: none;
      margin-top: 16px;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #c00;
      text-align: center;
    }

    /* ===== 空状態 ===== */
    .empty-state {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    /* ===== フッター ===== */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #bbb;
      padding: 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>📖 プリント英単語 発音アプリ</h1>
  <p>プリントの画像から英単語を読み取って発音できます</p>
</header>

<main>

  <!-- ===== 画像取り込みエリア ===== -->
  <div class="upload-area" id="upload-area">
    <div class="icon">🖼️</div>
    <p class="desc">英単語プリントの画像を選んでください<br>（JPG / PNG / HEIC など対応）</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
        📁 画像を選ぶ
      </button>
      <button class="btn btn-camera" id="camera-btn" onclick="document.getElementById('camera-input').click()">
        📷 カメラで撮る
      </button>
    </div>
    <!-- ファイル選択（ギャラリー） -->
    <input type="file" id="file-input"   accept="image/*"        onchange="handleFile(this.files[0])" />
    <!-- ファイル選択（カメラ） -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(this.files[0])" />
  </div>

  <!-- ===== 画像プレビュー ===== -->
  <div id="preview-section">
    <img id="preview-img" src="" alt="選択した画像" />
  </div>

  <!-- ===== OCR進捗 ===== -->
  <div id="progress-section">
    <p class="progress-label" id="progress-label">読み取り中... 0%</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- ===== エラー ===== -->
  <div id="error-msg"></div>

  <!-- ===== 結果 ===== -->
  <div id="result-section">
    <div class="result-header">
      <h2>📝 読み取った英単語</h2>
      <span class="word-count" id="word-count">0 語</span>
    </div>
    <div id="word-list"></div>
    <button class="btn btn-retry" onclick="resetApp()">🔄 別の画像でやり直す</button>
  </div>

</main>

<footer>タップすると発音します ・ ブラウザの音声読み上げを使用</footer>

<script>
  // ===== ドラッグ＆ドロップ対応 =====
  const uploadArea = document.getElementById('upload-area');

  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  // ===== ファイル処理メイン =====
  async function handleFile(file) {
    if (!file) return;

    // プレビュー表示
    const url = URL.createObjectURL(file);
    document.getElementById('preview-img').src = url;
    document.getElementById('preview-section').style.display = 'block';

    // 進捗バー表示
    setProgress(0, '読み取りを開始しています...');
    document.getElementById('progress-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    try {
      // Tesseract.js で OCR（英語モード）
      const result = await Tesseract.recognize(file, 'eng', {
        logger: info => {
          if (info.status === 'recognizing text') {
            const pct = Math.round(info.progress * 100);
            setProgress(pct, `読み取り中... ${pct}%`);
          }
        }
      });

      setProgress(100, '完了！');

      const rawText = result.data.text;
      const words = extractEnglishWords(rawText);

      // 結果表示
      showResults(words);

    } catch (err) {
      console.error(err);
      showError('読み取りに失敗しました。別の画像をお試しください。');
    } finally {
      document.getElementById('progress-section').style.display = 'none';
    }
  }

  // ===== 英単語の抽出 =====
  function extractEnglishWords(text) {
    // 改行・タブをスペースに変換して分割
    const tokens = text.replace(/[\r\n\t]+/g, ' ').split(/\s+/);

    const seen = new Set();
    const words = [];

    for (const raw of tokens) {
      // 前後の記号・数字・引用符を除去
      const word = raw.replace(/^[^a-zA-Z'-]+|[^a-zA-Z'-]+$/g, '');

      // 英字のみ（ハイフン付き可）・2文字以上
      if (/^[a-zA-Z][a-zA-Z'-]*[a-zA-Z]$/.test(word) || /^[a-zA-Z]{2}$/.test(word)) {
        const lower = word.toLowerCase();
        if (!seen.has(lower)) {
          seen.add(lower);
          words.push(lower);
        }
      }
    }

    // アルファベット順にソート
    return words.sort((a, b) => a.localeCompare(b));
  }

  // ===== 結果を表示 =====
  function showResults(words) {
    const list = document.getElementById('word-list');
    const count = document.getElementById('word-count');
    const section = document.getElementById('result-section');

    list.innerHTML = '';
    count.textContent = `${words.length} 語`;

    if (words.length === 0) {
      list.innerHTML = '<div class="empty-state">英単語が見つかりませんでした。<br>別の画像をお試しください。</div>';
    } else {
      for (const word of words) {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `<span class="word-text">${word}</span><span class="speak-icon">🔊</span>`;
        card.addEventListener('click', () => speak(word, card));
        list.appendChild(card);
      }
    }

    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ===== 発音（Web Speech API） =====
  let currentUtterance = null;

  function speak(word, cardEl) {
    // 前の発音を止める
    window.speechSynthesis.cancel();

    // speaking スタイルを外す
    document.querySelectorAll('.word-card.speaking').forEach(el => el.classList.remove('speaking'));

    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    utter.pitch = 1;

    utter.onstart = () => cardEl.classList.add('speaking');
    utter.onend   = () => cardEl.classList.remove('speaking');
    utter.onerror = () => cardEl.classList.remove('speaking');

    currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  }

  // ===== 進捗バー更新 =====
  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = `${pct}%`;
    document.getElementById('progress-label').textContent = label;
  }

  // ===== エラー表示 =====
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ===== リセット =====
  function resetApp() {
    // ファイル入力をリセット
    document.getElementById('file-input').value = '';
    document.getElementById('camera-input').value = '';

    // 各セクションを隠す
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('progress-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    // 発音を止める
    window.speechSynthesis.cancel();

    // 上にスクロール
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== スマホでカメラボタンが不要な場合（PCのみ）は任意で非表示 =====
  // カメラ入力はスマホでは capture='environment' で背面カメラを起動
  // PCでもファイル選択として機能するので非表示にはしない
</script>

</body>
</html>
